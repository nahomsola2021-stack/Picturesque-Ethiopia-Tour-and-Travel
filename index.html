igious art",'Drive to the spectacular Blue Nile Falls ("Tis Abay")',"Walk to the main viewpoint — one of Africa's great waterfalls","Return to Bahir Dar for overnight"],meals:"Breakfast, Lunch",accommodation:"Hotel in Bahir Dar"},{day:3,title:"Bahir Dar – Gondar",activities:["Morning drive north to the royal city of Gondar (3 hrs)","Visit the Royal Enclosure (Fasil Ghebbi) — UNESCO World Heritage Site","Explore the 17th-century castles of Emperor Fasilides and his successors","Visit the strikingly beautiful Debre Berhan Selassie Church with angel-ceiling murals","Evening free to explore Gondar town"],meals:"Breakfast, Dinner",accommodation:"Hotel in Gondar"},{day:4,title:"Gondar – Simien Mountains – Gondar",activities:["Early morning drive to Simien Mountains National Park (2.5 hrs)","Trek through dramatic highland scenery at Sankaber","Encounter troops of Gelada baboons grazing on the plateau","Spot Walia ibex and the breathtaking escarpment views","Return to Gondar in the late afternoon"],meals:"Breakfast, Packed Lunch",accommodation:"Hotel in Gondar"},{day:5,title:"Gondar – Axum",activities:["Morning flight or scenic drive to the ancient city of Axum","Visit the Northern Stelae Field — towering granite obelisks up to 33 meters tall","Explore the Church of St. Mary of Zion, believed to hold the Ark of the Covenant","Visit Queen of Sheba's Palace ruins and ancient tombs","Discover the Ezana Stone with inscriptions in three languages"],meals:"Breakfast, Dinner",accommodation:"Hotel in Axum"},{day:6,title:"Axum – Lalibela",activities:["Drive or fly from Axum to the holy city of Lalibela","Check in and rest before the afternoon exploration","Visit the first group of rock-hewn churches: Bet Medhane Alem (the world's largest rock-hewn church)","Explore Bet Maryam, Bet Golgotha, and the Church of Bet Gabriel","Watch the sunset paint the pink-hued churches golden"],meals:"Breakfast, Dinner",accommodation:"Hotel in Lalibela"},{day:7,title:"Lalibela – Full Day of Churches",activities:["Early morning visit to Bet Giyorgis (St. George's Church) — the most iconic, carved as a Greek cross","Explore the second group: Bet Amanuel, Bet Abba Libanos, Bet Mercurios","Walk through the tunnel passages connecting the churches","Visit local artisan workshops — traditional crosses, paintings, and weavings","Optional: sunrise visit to Bet Giyorgis at 5:30 AM for unforgettable photos"],meals:"Breakfast, Lunch",accommodation:"Hotel in Lalibela"},{day:8,title:"Lalibela – Addis Ababa (Return)",activities:["Morning at leisure — optional visit to the Asheton Maryam Monastery above Lalibela","Last coffee ceremony with a local family","Flight back to Addis Ababa","Farewell dinner in Addis Ababa with traditional music and dance show","Transfer to hotel or airport for onward journey"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.historicNorthDrive,category:"Cultural"},{id:2,title:"Historic North (Flight)",slug:"historic-north-flight",duration:"6 Days",transport:"Flight",description:"Experience the highlights of Ethiopia's historic northern route with the convenience of domestic flights. Visit UNESCO World Heritage Sites including the rock-hewn churches of Lalibela and the ancient kingdom of Axum in a time-efficient itinerary.",highlights:["Lalibela Rock Churches","Axum Obelisks","Gondar Royal Enclosure","Domestic Flights","Expert Local Guides"],itinerary:[{day:1,title:"Addis Ababa – Gondar (Flight)",activities:["Morning flight from Addis Ababa to Gondar (1 hr)","Airport pickup and transfer to hotel","Afternoon tour of the Royal Enclosure (UNESCO World Heritage Site)","Visit Emperor Fasilides' Castle, Iyasu's Palace, and the Bath House","Sunset at Debre Berhan Selassie Church with its famous angel ceiling"],meals:"Dinner",accommodation:"Hotel in Gondar"},{day:2,title:"Gondar – Bahir Dar (Drive) – Lake Monasteries",activities:["Morning drive to Bahir Dar (3 hrs) through scenic highlands","Afternoon boat trip on Lake Tana to the Zege Peninsula monasteries","Visit Ura Kidane Mihret — Ethiopia's most decorated monastery interior","Return by boat for sunset over Lake Tana","Dinner with fresh Lake Tana fish (Nile tilapia)"],meals:"Breakfast, Dinner",accommodation:"Hotel in Bahir Dar"},{day:3,title:"Blue Nile Falls – Bahir Dar – Axum (Flight)",activities:["Early morning drive to Blue Nile Falls","Walk across the old Portuguese bridge to the viewpoint","Return to Bahir Dar for afternoon flight to Axum","Arrive Axum — transfer and check in","Evening walk around the ancient city center"],meals:"Breakfast, Lunch",accommodation:"Hotel in Axum"},{day:4,title:"Axum – Ancient Sights",activities:["Visit the Stelae Park with towering 1,700-year-old granite obelisks","Explore the Church of St. Mary of Zion and the Treasury Chapel","Tour the ruins of the Queen of Sheba's Palace","Visit King Kaleb's and Gebre Meskel's tombs","Afternoon flight to Lalibela"],meals:"Breakfast, Dinner",accommodation:"Hotel in Lalibela"},{day:5,title:"Lalibela – All Rock Churches",activities:["Full day exploring all 11 rock-hewn churches carved in the 12th century","Northern Group: Bet Medhane Alem, Bet Maryam, Bet Golgotha, Bet Mikael","Eastern Group: Bet Gabriel-Raphael, Bet Amanuel, Bet Abba Libanos","Iconic Bet Giyorgis — the freestanding cruciform masterpiece","Walk the underground tunnel passages and open trenches between churches"],meals:"Breakfast, Lunch",accommodation:"Hotel in Lalibela"},{day:6,title:"Lalibela – Addis Ababa (Return Flight)",activities:["Optional sunrise visit to Bet Giyorgis at 5:30 AM","Morning at leisure for last photos and souvenir shopping","Flight back to Addis Ababa","City tour of Addis: National Museum (Lucy), Merkato Market","Farewell dinner with traditional music"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.historicNorthFlight,category:"Cultural"},{id:3,title:"Danakil Depression",slug:"danakil-depression",duration:"4 Days",transport:"Drive",description:"Explore one of the most extreme and alien landscapes on Earth. The Danakil Depression features active volcanoes, vast salt flats, colorful sulfur springs, and temperatures that make it one of the hottest places on the planet. A truly otherworldly experience.",highlights:["Erta Ale Active Volcano","Dallol Sulfur Springs","Salt Flats","Afar People","Camel Caravans","Lake Assal"],itinerary:[{day:1,title:"Addis Ababa – Mekele (Flight) – Drive to Danakil",activities:["Early morning flight from Addis Ababa to Mekele (1.5 hrs)","Briefing by the tour guide and vehicle check","Drive into the Danakil Depression (4-5 hrs) — the world's lowest point at -116m","Pass through Afar villages and observe traditional way of life","Set up camp near Erta Ale base — armed escort throughout","Evening rest before the midnight volcano ascent"],meals:"Lunch, Dinner",accommodation:"Camp near Erta Ale"},{day:2,title:"Erta Ale Active Lava Lake",activities:["Midnight ascent of Erta Ale volcano (2-3 hour hike in the dark)","Stand at the rim of the active lava lake — one of only 5 in the world","Watch molten lava bubbling and flowing in the crater","Sunrise at the volcano rim — surreal volcanic landscape","Descend back to camp for breakfast and rest","Afternoon drive to Dodom camp through the salt desert"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Dodom"},{day:3,title:"Dallol Sulfur Springs – Salt Flats – Camel Caravans",activities:["Early morning drive to Dallol — the most colorful place on Earth","Walk through yellow, green, and red sulfur springs (temperature: 106°C)","Explore the salt canyons and crystallized salt formations","Visit the salt flats where Afar men mine salt using traditional methods","Watch camel caravans loading salt blocks — unchanged for centuries","Visit Lake Afdera — an extremely salty flamingo lake"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Hamadela"},{day:4,title:"Salt Mines – Drive to Mekele – Return to Addis",activities:["Early morning visit to the active salt mining area","Watch Afar and Tigrayan miners extract and shape salt blocks","Drive back to Mekele through changing desert landscapes","Lunch in Mekele and city tour (optional)","Afternoon flight back to Addis Ababa","Debrief dinner in Addis with tour team"],meals:"Breakfast, Lunch",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.danakil,category:"Adventure"},{id:4,title:"Simien Mountains Trekking",slug:"simien-mountains-trekking",duration:"12 Days",transport:"Drive & Trek",description:"Embark on an epic trekking adventure through the UNESCO-listed Simien Mountains. Encounter endemic wildlife including the Gelada baboon, Ethiopian wolf, and Walia ibex while trekking through dramatic escarpments and peaks above 4,000 meters.",highlights:["Ras Dashen Summit (4,550m)","Gelada Baboons","Ethiopian Wolf","Dramatic Escarpments","Village Encounters","Camping Under Stars"],itinerary:[{day:1,title:"Addis Ababa – Gondar (Flight)",activities:["Fly from Addis Ababa to Gondar","Afternoon tour of Gondar's Royal Enclosure (Fasil Ghebbi)","Visit Fasilides' Bath — used for Timkat (Epiphany) celebrations","Evening gear check and trek briefing with your guide","Early dinner and rest"],meals:"Dinner",accommodation:"Hotel in Gondar"},{day:2,title:"Gondar – Simien Mountains (Sankaber Camp, 3,260m)",activities:["Drive from Gondar to the park headquarters at Debark (3 hrs)","Complete park registration and collect armed scout","Trek to Sankaber camp (6 km, 3 hrs) — first views of the escarpment","Spot first Gelada baboons grazing on the plateau","Camp setup with panoramic escarpment sunset views"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Sankaber (3,260m)"},{day:3,title:"Sankaber – Gich Camp (3,600m)",activities:["Morning trek along the escarpment edge (12 km, 5-6 hrs)","Dramatic views across the valleys 1,000m below","Encounter large troops of Gelada baboons — Ethiopia's unique grass-grazing primates","Possible sighting of Ethiopian wolves in the heath zone","Arrive Gich camp — one of the most spectacular camping spots in Africa"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Gich (3,600m)"},{day:4,title:"Gich – Imet Gogo Viewpoint – Chenek (3,620m)",activities:["Side hike to Imet Gogo (3,926m) — the most dramatic viewpoint in Simien","Stand on a cliff edge with 1,500m sheer drop below","Trek to Chenek camp through Afro-alpine moorland","Spot Walia ibex — found only in these mountains, endangered species","Star gazing from camp at high altitude"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Chenek (3,620m)"},{day:5,title:"Chenek – Ambikwa – Chenek",activities:["Long day hike to Ambikwa valley and back","Best chance to see Ethiopian wolves hunting rodents in the moorland","Spot Walia ibex in large groups on the rocky ledges","Visit a remote highland village for cultural exchange","Return to Chenek camp for dinner"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp at Chenek (3,620m)"},{day:6,title:"Chenek – Bwahit Pass (4,430m) – Ras Dashen Base",activities:["Challenging day — ascend to Bwahit Pass at 4,430m","Second highest peak in Ethiopia — panoramic views in all directions","Trek down toward Ras Dashen base camp through wild moorland","Evening acclimatization walk and briefing for summit day","Hot camp meal and early sleep for the summit push"],meals:"Breakfast, Lunch, Dinner",accommodation:"High Camp at Ras Dashen Base"},{day:7,title:"Ras Dashen Summit (4,550m) – Highest Point in Ethiopia",activities:["4:00 AM early start — summit hike to Ras Dashen (4-5 hrs)","Reach the highest point in Ethiopia at 4,550m above sea level","Panoramic views over Ethiopia, Eritrea, and Sudan on clear days","Celebrate your achievement at the summit cairn","Descend back to base camp and then down to lower camp"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp below Ras Dashen"},{day:8,title:"Trek Out to Road – Drive to Gondar",activities:["Final morning trek through moorland back to the road head","Vehicle pickup — farewell to your scout and camp crew","Drive back to Gondar through highland villages","Hot shower and rest at hotel","Celebration dinner in Gondar"],meals:"Breakfast, Dinner",accommodation:"Hotel in Gondar"},{day:9,title:"Gondar – Lalibela (Flight)",activities:["Morning at leisure in Gondar","Flight to Lalibela","Afternoon introduction to the rock churches","Visit Bet Giyorgis at sunset","Dinner and rest"],meals:"Breakfast, Dinner",accommodation:"Hotel in Lalibela"},{day:10,title:"Lalibela – All Churches",activities:["Full day exploring all 11 rock-hewn churches","Northern and Eastern church groups with expert guide","Tunnel passages and underground trenches","Visit local artisans and craftspeople","Sunset photography at Bet Giyorgis"],meals:"Breakfast, Lunch",accommodation:"Hotel in Lalibela"},{day:11,title:"Lalibela – Axum (Flight)",activities:["Optional sunrise visit to the churches at 5:30 AM","Afternoon flight to Axum","Visit the Stelae Park and St. Mary of Zion Church","See the alleged location of the Ark of the Covenant","Dinner in Axum"],meals:"Breakfast, Dinner",accommodation:"Hotel in Axum"},{day:12,title:"Axum – Addis Ababa (Return)",activities:["Morning tour of Axum ruins and Queen of Sheba's Palace","Flight back to Addis Ababa","Farewell lunch/dinner in Addis Ababa","Final shopping at Merkato or Bole Road boutiques","Transfer to international airport for departure"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.simienTrekLong,category:"Trekking"},{id:5,title:"Simien Mountains Day Trip",slug:"simien-mountains-day-trip",duration:"1 Day",transport:"Drive",description:"Perfect for travelers with limited time, this day trip from Gondar takes you into the heart of the Simien Mountains National Park. Enjoy breathtaking views, spot Gelada baboons, and experience the dramatic landscapes of this UNESCO World Heritage Site.",highlights:["Gelada Baboons","Panoramic Views","Sankaber Area","Expert Guide","Packed Lunch","Hotel Pickup"],itinerary:[{day:1,title:"Gondar – Simien Mountains – Gondar",activities:["6:00 AM pickup from your hotel in Gondar","Drive to Debark (park HQ) — register and collect armed scout (1.5 hrs)","Drive into the Simien Mountains to Sankaber viewpoint","Trek along the escarpment edge — sheer cliffs dropping 1,000m","Find and observe a troop of Gelada baboons (100-200 individuals)","Packed lunch at a scenic overlook with valley views","Optional: walk to Jinbar Waterfall viewpoint","Return drive to Gondar — arrive early evening","Drop off at your hotel by 7:00 PM"],meals:"Packed Lunch",accommodation:"Not included (day trip only)"}],image:ze.simienDayTrip,category:"Trekking"},{id:6,title:"Omo Valley Tour (Drive)",slug:"omo-valley-drive",duration:"8 Days",transport:"Drive",description:"Immerse yourself in the rich cultural tapestry of the Lower Omo Valley, home to some of Africa's most fascinating indigenous tribes. Visit the Mursi, Hamer, Karo, and Dassanech peoples, each with their unique customs, body decorations, and ceremonies.",highlights:["Mursi Tribe","Hamer Bull Jumping","Karo Body Painting","Turmi Market","Mago National Park","Key Afer Market"],itinerary:[{day:1,title:"Addis Ababa – Arba Minch (Drive)",activities:["Depart Addis Ababa after breakfast and drive south","Pass through the scenic Rift Valley with Ethiopian Highlands views","Stop at Lake Ziway for hippo and bird watching",'Continue to Arba Minch — "Forty Springs" — gateway to the south',"Dinner overlooking the spectacular Nechisar National Park"],meals:"Breakfast, Dinner",accommodation:"Hotel in Arba Minch"},{day:2,title:"Arba Minch – Konso – Key Afer",activities:["Morning boat trip on Chamo Lake to see crocodiles and hippos","Visit the UNESCO-listed Konso cultural landscapes and walled villages","Explore a Konso village with wooden Waga totems of deceased warriors","Drive to Key Afer for Thursday market (timing adjusted by day)","Observe Banna and Tsemay tribes trading livestock, sorghum, and crafts"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp or lodge near Jinka"},{day:3,title:"Jinka – Mago National Park – Mursi Village",activities:["Drive to Mago National Park entrance","Game drive through the park — spot buffalo, giraffe, and elephants","Drive to a Mursi village — the famous lip-plate people","Observe the elaborate scarification and ornamental traditions","Learn about Mursi cattle culture and warrior traditions","Return to Jinka for overnight"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Lodge in Jinka"},{day:4,title:"Jinka – Dus – Karo Village",activities:["Drive southeast along the Omo River to Dus village","Visit the Karo tribe — master body painters of the Omo Valley","Watch Karo men paint elaborate designs on each other with chalk and ochre","Photograph the tribe with stunning Omo River background","Continue to Turmi area for overnight"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp near Turmi"},{day:5,title:"Turmi – Hamer Village – Bull Jumping Ceremony",activities:["Morning visit to a Hamer village — meet women with ochre hair and bead jewelry","Visit Monday market in Turmi (Hamer and Benna tribes)","Afternoon — if timing allows — attend a traditional Hamer Bull Jumping ceremony (Ukuli Bulla)","Watch young men run across the backs of cattle to prove manhood","Witness whipping ceremony where women volunteer to be whipped as an act of love"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp near Turmi"},{day:6,title:"Turmi – Omorate – Dassanech Village",activities:["Drive to Omorate on the banks of the Omo River","Cross by dugout canoe to the Dassanech side","Visit the Dassanech tribe — the southernmost Omo Valley people","See their unique riverside village lifestyle and crocodile hunting traditions","Return and drive north toward Konso"],meals:"Breakfast, Lunch, Dinner",accommodation:"Lodge in Konso"},{day:7,title:"Konso – Arba Minch – Addis Ababa Drive",activities:["Morning exploration of Konso town and markets","Drive north through the Rift Valley toward Addis Ababa","Stop at Lake Langano for swimming or birdwatching","Continue drive to Addis Ababa","Arrive Addis Ababa by evening"],meals:"Breakfast, Lunch",accommodation:"Hotel in Addis Ababa"},{day:8,title:"Addis Ababa – Departure",activities:["Morning visit to the National Museum — see Lucy (Australopithecus)","Visit Merkato — Africa's largest open-air market","Ethiopian coffee ceremony with a local family","Souvenir shopping at Bole Road boutiques","Transfer to Addis Ababa Bole International Airport for departure"],meals:"Breakfast",accommodation:"Departure"}],image:ze.omoValleyDrive,category:"Cultural"},{id:7,title:"Omo Valley Tour (Flight)",slug:"omo-valley-flight",duration:"4 Days",transport:"Flight",description:"A condensed but immersive journey to the Omo Valley by air. Fly to Jinka and explore the remarkable tribal communities of southern Ethiopia, experiencing their unique cultures, traditions, and way of life.",highlights:["Flight to Jinka","Mursi Tribe Visit","Hamer Village","Local Markets","Cultural Immersion","Expert Guide"],itinerary:[{day:1,title:"Addis Ababa – Jinka (Flight)",activities:["Morning flight from Addis Ababa to Jinka (1.5 hrs)","Airport pickup and transfer to lodge","Afternoon visit to Jinka Museum — excellent introduction to Omo Valley tribes","Drive to a Banna village near Jinka","Observe traditional stick fighting, beehive huts, and cattle culture","Dinner at lodge with local guides' cultural briefing"],meals:"Lunch, Dinner",accommodation:"Lodge in Jinka"},{day:2,title:"Mago National Park – Mursi Village",activities:["Early morning drive to Mago National Park","Game drive: spot topi, buffalo, giraffe, and birdlife","Drive into the park to a remote Mursi village","Meet the Mursi — observe lip plates, scarification, and stick fighting","Learn about their pastoral cattle-centered lifestyle","Return to Jinka for dinner and overnight"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Lodge in Jinka"},{day:3,title:"Jinka – Turmi – Hamer Village",activities:["Drive to Turmi (4-5 hrs) through beautiful savannah landscape","Stop at Key Afer market if it is market day (Thursday)","Arrive Turmi — visit a Hamer village","See women with ochre-coated hair and intricate bead jewelry","If lucky, witness preparations for a Bull Jumping ceremony","Turmi market — Hamer tribe trading livestock and crafts"],meals:"Breakfast, Lunch, Dinner",accommodation:"Lodge near Turmi"},{day:4,title:"Turmi – Jinka – Addis Ababa (Flight)",activities:["Early morning visit to a Karo body-painting village near the Omo River","Drive back to Jinka (4-5 hrs)","Afternoon flight from Jinka to Addis Ababa","Farewell dinner in Addis Ababa","Transfer to international airport"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis or departure"}],image:ze.omoValleyFlight,category:"Cultural"},{id:8,title:"Bale Mountains Trekking (7 Days)",slug:"bale-mountains-7days",duration:"7 Days",transport:"Drive & Trek",description:"Trek through the pristine wilderness of the Bale Mountains, home to the largest population of Ethiopian wolves and the enchanting Harenna Forest. Cross the Sanetti Plateau, one of the highest plateaus in Africa, and descend through cloud forests.",highlights:["Ethiopian Wolf","Sanetti Plateau","Harenna Forest","Mountain Nyala","Endemic Birds","Tullu Dimtu Peak"],itinerary:[{day:1,title:"Addis Ababa – Dinsho (Drive)",activities:["Depart Addis Ababa and drive southeast to Bale Mountains (6-7 hrs)","Pass through Rift Valley lakes and highland villages","Arrive at Dinsho — park headquarters at 2,400m","Afternoon walk around the Dinsho Wildlife Reserve","Spot Mountain Nyala, Menelik's bushbuck, and warthogs around camp"],meals:"Lunch, Dinner",accommodation:"Lodge at Dinsho"},{day:2,title:"Dinsho – Web Valley Trek",activities:["Morning trek through Dinsho Forest — giant heather trees and podocarpus","Walk into the Web Valley following the Web River","Excellent bird-watching: Abyssinian owl, Bale parisoma, and 300+ species","Spot Mountain Nyala in the riverine forest","Afternoon return to Dinsho for camp"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Lodge at Dinsho"},{day:3,title:"Dinsho – Gaysay Valley – Morebawa Camp",activities:["Trek from Dinsho to Gaysay grasslands (8 km)","This valley has the highest density of Mountain Nyala in the park","Also spot Bohor reedbuck, Menelik's bushbuck in open savannah","Ascend to Morebawa camp through giant heather forest","Camp at 3,300m — cool Afro-alpine environment"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp at Morebawa (3,300m)"},{day:4,title:"Morebawa – Sanetti Plateau (3,960–4,377m)",activities:["Trek up to the Sanetti Plateau — the largest plateau in Africa above 3,000m","Walk across high moorland of giant lobelia and heather","Intensive Ethiopian wolf search: the plateau is their stronghold","Watch wolves hunting the giant mole-rat on the moorland","Camp at the plateau with vast skies above"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp on Sanetti Plateau"},{day:5,title:"Sanetti Plateau – Tullu Dimtu (4,377m) – Harenna Forest",activities:["Summit Tullu Dimtu — the second highest peak in Ethiopia at 4,377m","360° panoramic views over the plateau and southern lowlands","Begin descent through the dramatic transition from moorland to forest","Enter the magnificent Harenna Forest — Ethiopia's largest montane forest","Camp at forest edge — hear baboons, bush pigs, and night sounds"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp at Harenna Forest edge"},{day:6,title:"Harenna Forest Exploration",activities:["Full day in the Harenna Forest — one of Africa's most biodiverse forests","Look for lion, leopard, and African wild dog (rare but present)","Bird-watching: Yellow-fronted parrot, Harwood's francolin, and many endemics","Visit a wild coffee grove — Harenna is one of coffee's homelands","See giant fig trees, orchids, and tree ferns","Collect wild honey with local Oromo honey hunters"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp in Harenna Forest"},{day:7,title:"Harenna – Robe – Addis Ababa",activities:["Final morning walk in the lower forest for bird watching","Drive to Robe (Bale zone capital) for lunch","Long drive back to Addis Ababa (6-7 hrs)","Farewell dinner in Addis Ababa","Transfer to hotel or international airport"],meals:"Breakfast, Lunch, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.bale7Days,category:"Trekking"},{id:9,title:"Bale Mountains Trekking (3-4 Days)",slug:"bale-mountains-short",duration:"3-4 Days",transport:"Drive & Trek",description:"A shorter but equally rewarding Bale Mountains experience. Perfect for those with limited time, this trek covers the highlights including the Sanetti Plateau, Web Valley, and the chance to spot the rare Ethiopian wolf in its natural habitat.",highlights:["Ethiopian Wolf Sighting","Sanetti Plateau","Web Valley","Dinsho Headquarters","Endemic Wildlife","Mountain Scenery"],itinerary:[{day:1,title:"Addis Ababa – Dinsho (Drive) – Afternoon Wildlife Walk",activities:["Early morning departure from Addis Ababa (6 hrs drive)","Arrive Dinsho, register at park headquarters","Afternoon walk in Dinsho Wildlife Reserve","Spot Mountain Nyala, bushbuck, and warthog near the lodge","Birding: lammergeyer, blue-winged goose, Abyssinian catbird"],meals:"Lunch, Dinner",accommodation:"Lodge at Dinsho"},{day:2,title:"Sanetti Plateau – Ethiopian Wolf Territory",activities:["Drive up to the Sanetti Plateau (3,960–4,377m) — the roof of Africa","Trek across the moorland and look for Ethiopian wolves","Watch wolves hunt giant mole-rats in the open grassland","Visit Tullu Dimtu peak for panoramic views","Return to Dinsho for overnight"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Lodge at Dinsho"},{day:3,title:"Web Valley Trek – Birding & Wildlife",activities:["Morning trek along the Web River valley","Dense heather forest with colobus monkeys","Spot Mountain Nyala family groups in the valley","Excellent bird photography opportunities","Afternoon drive back toward Addis Ababa"],meals:"Breakfast, Packed Lunch",accommodation:"Hotel en route or Addis"},{day:4,title:"Return to Addis Ababa (Optional Extension)",activities:["Continue drive to Addis Ababa","Optional stop at Shashamene for shopping","Arrive Addis by afternoon","Farewell dinner or airport transfer"],meals:"Breakfast",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.baleShort,category:"Trekking"},{id:10,title:"Harar and Surroundings",slug:"harar-surroundings",duration:"5 Days",transport:"Flight",description:"Discover the ancient walled city of Harar, considered the fourth holiest city in Islam. Explore its 368 alleyways, vibrant markets, and witness the famous hyena feeding ceremony. Visit surrounding Oromo villages and the scenic Harar countryside.",highlights:["Hyena Man Feeding","Harar Old City","Rimbaud House","Coffee Ceremony","Dire Dawa","Traditional Markets"],itinerary:[{day:1,title:"Addis Ababa – Dire Dawa (Flight)",activities:["Morning flight from Addis Ababa to Dire Dawa (1 hr)","Airport pickup and drive to Harar (1.5 hrs on scenic road)","Check in to hotel inside the old walled city (Jugol)","Afternoon walk through Jugol — the ancient Islamic walled city","Explore the labyrinthine alleyways and traditional Harari houses","Evening: witness the famous hyena feeding ceremony near Erer Gate"],meals:"Dinner",accommodation:"Guesthouse inside Jugol (old Harar)"},{day:2,title:"Harar Old City Deep Dive",activities:["Morning visit to the colorful Shoa Gate Market","Visit the Rimbaud House (Arthur Rimbaud Museum) — French poet lived here","Explore the 82 mosques of Harar — density of mosques per square km rivals Mecca","Visit the traditional Harari home (Harari house museum)","Attend a traditional Ethiopian coffee ceremony in a local home","Afternoon walk on the old city walls with views over the Hararghe hills"],meals:"Breakfast, Lunch",accommodation:"Guesthouse inside Jugol"},{day:3,title:"Oromo Villages – Harar Surroundings",activities:["Drive into the scenic Hararghe countryside","Visit a traditional Oromo village and farmstead","See traditional chat (khat) farming — major cash crop of eastern Ethiopia","Visit the Jebril Weldiye cave church near Harar","Stop at a traditional honey wine (tej) brewery","Return to Harar for overnight"],meals:"Breakfast, Packed Lunch",accommodation:"Guesthouse inside Jugol"},{day:4,title:"Harar – Dire Dawa – Explore Dire Dawa",activities:["Morning drive to Dire Dawa (1.5 hrs)","Visit the Dire Dawa Railway Station — built 1902, Franco-Ethiopian Railway","Explore the European quarter of Dire Dawa — colonial architecture","Visit the vibrant Dire Dawa central market","Afternoon return to Harar for final night","Second hyena feeding ceremony — different location, better photos"],meals:"Breakfast, Lunch, Dinner",accommodation:"Guesthouse inside Jugol"},{day:5,title:"Harar – Dire Dawa – Addis Ababa (Flight)",activities:["Final morning stroll in the peaceful old city before crowds arrive","Visit the Harar Jugol wall — 16th century fortification, 5 gates","Drive to Dire Dawa airport","Flight to Addis Ababa","Farewell dinner in Addis Ababa"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.harar,category:"Cultural"},{id:11,title:"Addis Ababa and Surroundings",slug:"addis-ababa-surroundings",duration:"2-3 Days",transport:"Drive",description:"Explore Ethiopia's vibrant capital and its surroundings. Visit the National Museum (home of Lucy), Merkato (Africa's largest open-air market), Holy Trinity Cathedral, and take day trips to Debre Libanos monastery and the scenic Entoto Mountains.",highlights:["National Museum (Lucy)","Merkato Market","Holy Trinity Cathedral","Entoto Mountains","Ethiopian Coffee","Local Cuisine"],itinerary:[{day:1,title:"Addis Ababa City Highlights",activities:['Morning visit to the National Museum — home of "Lucy" (Australopithecus afarensis)',"See the original 3.2-million-year-old fossilized skeleton","Visit Holy Trinity Cathedral — Ethiopia's most important Orthodox church","See the graves of Emperor Haile Selassie and Ethiopian patriots","Afternoon visit to Merkato — the largest open-air market in Africa","Explore the spice market, coffee stalls, and traditional craft sections","Coffee ceremony at a traditional Addis Ababa home"],meals:"Breakfast, Lunch",accommodation:"Hotel in Addis Ababa"},{day:2,title:"Entoto Mountains – Debre Libanos Monastery",activities:["Morning drive up to Entoto Natural Park at 3,200m","Visit Entoto Maryam Church — where Emperor Menelik II was crowned king in 1889","Walk through eucalyptus forest with panoramic views over Addis Ababa","Drive north to Debre Libanos Monastery (2 hrs from Addis)","Visit the 13th-century monastery built in a dramatic gorge","Walk to the Portuguese Bridge over the gorge","Return to Addis Ababa for farewell dinner"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa"},{day:3,title:"Optional Extension – Addis Ababa",activities:["Morning visit to the African Union Headquarters (external tour)","Visit the Ethnological Museum at Addis Ababa University","Explore the colorful Piazza neighborhood — Italian colonial architecture","Lunch at a traditional Addis Ababa restaurant (injera and tibs)","Evening farewell at a cultural restaurant with traditional music","Transfer to Bole International Airport"],meals:"Breakfast, Lunch",accommodation:"Departure"}],image:ze.addisAbaba,category:"Cultural"},{id:12,title:"Addis Ababa Unity Park",slug:"unity-park",duration:"1 Day",transport:"Drive",description:"Discover the magnificent Unity Park inside the Grand Palace compound — a 40-hectare living museum showcasing Ethiopia's royal history, wildlife enclosures, lush gardens, and imperial pavilions. A perfect half-day or full-day experience in the heart of Addis Ababa.",highlights:["Grand Palace Grounds","Wildlife Enclosures","Imperial Pavilions","Royal Gardens","Ethiopian History Exhibits","Guided Palace Tour"],itinerary:[{day:1,title:"Unity Park – Full Day Experience",activities:["Morning pickup and drive to Unity Park inside the Grand Palace","Guided tour of the palace compound history and architecture","Visit the Ethiopian cultural pavilions — 9 regional cultural houses","Explore wildlife enclosures: lions, leopards, hyenas, colobus monkeys","Walk through the beautifully manicured imperial gardens","Visit the history exhibits and royal ceremonial halls","Traditional coffee ceremony inside the park","Afternoon leisure in the park gardens and photography","Return to your hotel by early evening"],meals:"Packed Lunch",accommodation:"Not included (day trip)"}],image:ze.unityParkTour,category:"Cultural"},{id:13,title:"National Palace Tour",slug:"national-palace",duration:"1 Day",transport:"Drive",description:"Visit the iconic Jubilee Palace — the official National Palace of Ethiopia, steeped in imperial history and surrounded by beautifully manicured gardens. Explore the ceremonial halls, historical artifacts, and learn about Ethiopia's fascinating royal heritage.",highlights:["Jubilee Palace Grounds","Imperial Ceremonial Halls","Historical Artifacts","Manicured Royal Gardens","Ethiopia's Royal Heritage","Expert Historical Guide"],itinerary:[{day:1,title:"National Palace – Historic Tour",activities:["Morning hotel pickup and transfer to the National Palace","Expert guide introduction to the palace's history (built 1955 for Emperor Haile Selassie's jubilee)","Tour the imperial ceremonial halls and state reception rooms","See historical artifacts and royal memorabilia","Walk through the palace gardens with their diverse collection of trees","Photography session in the imperial grounds","Lunch at a nearby traditional restaurant","Optional: combine with Holy Trinity Cathedral visit in the afternoon"],meals:"Lunch",accommodation:"Not included (day trip)"}],image:ze.nationalPalaceTour,category:"Cultural"},{id:14,title:"Entoto Park & Highland Trail",slug:"entoto-park",duration:"1 Day",transport:"Drive",description:"Escape the city and ascend to Entoto Natural Park at 3,200m above Addis Ababa. Hike through dense eucalyptus forests, visit the historic Maryam Church where Emperor Menelik II was crowned, and enjoy sweeping panoramic views of the entire capital city below.",highlights:["Entoto Maryam Church","Panoramic City Views","Eucalyptus Forest Hike","Emperor Menelik II History","Highland Wildlife","Fresh Mountain Air"],itinerary:[{day:1,title:"Entoto Natural Park – Forest Hike & History",activities:["Early morning pickup (cool mountain air is best before 10 AM)","Drive up the Entoto ridge to 3,200m — panoramic views of Addis Ababa","Visit Entoto Maryam Church — site of Emperor Menelik II's coronation (1889)","Visit Entoto Raguel Church and the small palace museum","Trek through dense eucalyptus forest on marked trails (4-6 km hike)","Bird-watching: Abyssinian woodpecker, Wattled ibis, Ethiopian cisticola","Encounter women carrying eucalyptus firewood on their backs — iconic Entoto scene","Picnic lunch in the forest with city views","Return to Addis Ababa mid-afternoon"],meals:"Packed Lunch",accommodation:"Not included (day trip)"}],image:ze.entotoParkTour,category:"Trekking"},{id:15,title:"✦ Wenchi Crater Lake",slug:"wenchi-crater-lake",duration:"2 Days",transport:"Drive",description:"Journey to the stunning Wenchi Crater Lake near Ambo town — a breathtaking volcanic caldera filled with emerald waters, surrounded by dense forest and steaming hot springs. Ride horses around the rim, take a wooden boat to the island monastery, and soak in hot springs.",highlights:["Crater Lake Boat Trip","Island Monastery","Horse Riding on Rim","Natural Hot Springs","Crater Waterfall","Dense Forest Hiking"],itinerary:[{day:1,title:"Addis Ababa – Ambo – Wenchi Crater Rim",activities:["Depart Addis Ababa after breakfast — drive west to Ambo (2.5 hrs)","Brief stop in Ambo — famous for natural mineral water springs","Drive to Wenchi Crater rim (30 min from Ambo)","First views of the stunning 7km-wide volcanic caldera","Descend into the crater on horseback (traditional local horses)","Ride along the crater trail through cloud forest to the lakeshore","Wooden dugout boat trip across the emerald green crater lake","Visit the ancient island monastery (Cherkos Church) on the lake island","Monks will show you ancient illuminated manuscripts and crosses","Return boat trip and ascent back to the crater rim","Overnight in basic guesthouse near the crater"],meals:"Breakfast, Lunch, Dinner",accommodation:"Guesthouse near Wenchi Crater"},{day:2,title:"Wenchi – Hot Springs – Waterfall – Return to Addis",activities:["Early morning sunrise at the crater rim — mist rising from the lake","Hike down a different trail to the crater floor","Visit the natural hot springs — geothermal waters at the lake's edge","Swim in the natural hot spring pools","Trek to the stunning Wenchi Waterfall hidden inside the crater","Photograph the 30-meter waterfall dropping into the forest below","Picnic lunch by the waterfall","Hike back up to the rim","Drive back to Addis Ababa (arrive early evening)"],meals:"Breakfast, Packed Lunch",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.wenchiTour,category:"Adventure",isExclusive:!0},{id:16,title:"Gorgora Lakeside Retreat",slug:"gorgora",duration:"3 Days",transport:"Drive",description:"Discover Gorgora — a tranquil lakeside town on the southern shores of Lake Tana, Ethiopia's largest lake. Explore Portuguese castle ruins, visit ancient island monasteries by boat, spot hippos and rare birds, and unwind in eco-lodge accommodations by the lake.",highlights:["Lake Tana Boat Tour","Portuguese Castle Ruins","Island Monasteries","Hippo & Bird Watching","Eco-Lodge Stay","Sunset Over Lake Tana"],itinerary:[{day:1,title:"Addis Ababa – Gondar – Gorgora",activities:["Morning flight or drive from Addis to Gondar","Drive from Gondar to Gorgora on the south shore of Lake Tana (2 hrs)","Check in to eco-lodge with lake views","Afternoon sunset boat trip on Lake Tana","Spot hippos emerging from the water at dusk","Dinner at the eco-lodge with fresh Lake Tana fish"],meals:"Dinner",accommodation:"Eco-lodge at Gorgora"},{day:2,title:"Portuguese Castle – Island Monasteries – Bird Watching",activities:["Morning visit to the ruins of the 17th-century Portuguese castle near Gorgora","Learn about the short-lived Portuguese-Ethiopian alliance","Boat trip to the island monasteries on Lake Tana","Visit Debre Sina Maryam Church with remarkable painted interior","Bird-watching on the lake: African fish eagle, yellow-billed stork, pelicans","Spot Goliath heron, malachite kingfisher, and 300+ bird species","Evening sundowner from the dock watching the hippos"],meals:"Breakfast, Lunch, Dinner",accommodation:"Eco-lodge at Gorgora"},{day:3,title:"Gorgora – Gondar – Return",activities:["Early morning kayaking or rowing on the calm lake","Final bird walk around the lodge grounds","Drive back to Gondar","Visit Gondar's Royal Enclosure (time permitting)","Flight or drive back to Addis Ababa","Farewell dinner"],meals:"Breakfast, Dinner",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.gorgoraTour,category:"Cultural"},{id:17,title:"✦ Chebera Churchura National Park",slug:"chebera-churchura",duration:"4 Days",transport:"Drive",description:"Venture into one of Ethiopia's best-kept wildlife secrets — Chebera Churchura National Park in southern Ethiopia. Home to massive hippo pools, African elephants, buffalo herds, lions, and over 300 bird species in pristine wilderness rarely visited by tourists.",highlights:["Hippo Pool Viewing","Elephant Herds","Buffalo & Lion Safari","River Game Drives","300+ Bird Species","Off-the-Beaten-Path Adventure"],itinerary:[{day:1,title:"Addis Ababa – Wolkite – Dawro (Drive)",activities:["Early morning departure from Addis Ababa heading southwest","Drive through the Gurage highlands and Wolkite town","Beautiful mountain scenery through terraced farmland","Cross the Gilgel Gibe reservoir bridge","Arrive at the gateway town to Chebera Churchura by late afternoon","Park briefing with rangers and overnight preparation"],meals:"Breakfast, Dinner",accommodation:"Lodge near park entrance"},{day:2,title:"Chebera Churchura – Elephant & Hippo Search",activities:["Early morning game drive into the park at sunrise","Track African elephant herds through the riverine forest","Observe elephant behavior — the park has one of Ethiopia's largest populations","Drive to the Koysha River hippo pools","Watch dozens of hippos in the river — incredible viewing from the bank","Afternoon bird walk: spot African fish eagle, hornbills, and kingfishers","Sundowner at a river viewpoint"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp inside the park"},{day:3,title:"Lion & Buffalo Safari – Night Drive",activities:["Pre-dawn game drive for lion activity (most active at dawn)","Track buffalo herds through the open woodland savannah","Look for leopard in the riverine trees","African wild dog search — packs occasionally roam the park","Afternoon rest at camp","Night game drive: spot nocturnal animals — civet, genet, African wildcat","Campfire dinner with ranger wildlife stories"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp inside the park"},{day:4,title:"Final Morning Walk – Drive Back to Addis",activities:["Final sunrise bush walk with armed ranger","Walking safari: tracks, dung, and bird activity up close","Spot smaller mammals: mongoose, olive baboon, colobus monkey","Depart park and begin long drive back to Addis Ababa","Stop at Wolkite for lunch","Arrive Addis Ababa by evening — farewell dinner"],meals:"Breakfast, Lunch",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.cheberaTour,category:"Adventure",isExclusive:!0},{id:18,title:"✦ Maze National Park Safari",slug:"maze-national-park",duration:"3 Days",transport:"Drive",description:"Explore Maze National Park — one of Ethiopia's most underrated wildlife reserves in the Omo zone of southern Ethiopia. Vast savannah grasslands host the endemic Swayne's hartebeest, lions, leopards, wild dogs, and an extraordinary variety of birds.",highlights:["Swayne's Hartebeest","Lion & Leopard Tracking","Savannah Game Drives","Wild Dog Sightings","Diverse Bird Species","Authentic Safari Experience"],itinerary:[{day:1,title:"Addis Ababa – Sodo – Maze National Park",activities:["Early morning departure from Addis Ababa heading south","Drive through the Ethiopian Rift Valley (6-7 hrs)","Pass by Lake Ziway, Lake Langano, and Lake Abijata-Shalla","Arrive in Sodo (Wolayta zone) for lunch","Continue drive to Maze National Park (2 hrs from Sodo)","Check in to camp and evening park briefing with rangers","Sundowner at the park edge watching the savannah light fade"],meals:"Breakfast, Lunch, Dinner",accommodation:"Camp at Maze NP"},{day:2,title:"Full Day Safari – Swayne's Hartebeest & Big Cats",activities:["Pre-dawn game drive — best time for predator activity","Search for Swayne's hartebeest: an endemic and endangered Ethiopian antelope","Track lion prides across the open savannah grasslands","Look for leopard in the scattered acacia trees","Midday rest at camp in the shade","Afternoon game drive focusing on birds and plains game","Bird checklist: over 300 species including secretary bird, ground hornbill","Spot reedbuck, oribi, and warthog in the evening light","Campfire dinner under the vast Ethiopian night sky"],meals:"Breakfast, Packed Lunch, Dinner",accommodation:"Camp at Maze NP"},{day:3,title:"Morning Safari – Drive Back to Addis Ababa",activities:["Final sunrise game drive — look for African wild dogs (rare pack present)","Walking safari with armed ranger in the morning cool","Spot tracks and signs of the previous night's wildlife activity","Depart Maze National Park after breakfast","Long drive back to Addis Ababa via Sodo and Rift Valley","Stop at Lake Langano for a swim (optional)","Arrive Addis Ababa by late evening","Farewell dinner at a traditional restaurant"],meals:"Breakfast, Lunch",accommodation:"Hotel in Addis Ababa (or departure)"}],image:ze.mazeTour,category:"Adventure",isExclusive:!0}],zc=[{id:1,name:"Lalibela",description:"The 'New Jerusalem' — home to 11 magnificent rock-hewn churches carved from solid rock in the 12th century, a UNESCO World Heritage Site and one of Africa's greatest architectural wonders.",image:le.lalibela,location:"Amhara Region",region:"Amhara",details:{overview:"Lalibela is often called the 'Eighth Wonder of the World'. These 11 monolithic churches were carved downward into solid volcanic rock by King Lalibela in the 12th century, intended to create a 'New Jerusalem' in Africa. Thousands of pilgrims visit year-round, and during Ethiopian Christmas (Genna) and Timkat (Epiphany), the site becomes a sea of white-robed worshippers. The most iconic church, Bet Giyorgis (St. George), is carved in the shape of a Greek cross and stands 15 meters tall.",bestTime:"October – March (dry season). Visit during Genna (Jan 7) or Timkat (Jan 19) for extraordinary ceremonies.",altitude:"2,630 meters above sea level",travelTime:"1 hour by flight from Addis Ababa / 2 days by road",mustSee:["Bet Giyorgis – the iconic cross-shaped church","Bet Medhane Alem – world's largest rock-hewn church","Underground tunnel passages between churches","Asheton Maryam Monastery above the village","Traditional Lalibela coffee ceremony"],funFact:"Legend says King Lalibela was transported to Jerusalem by angels and commanded to build a New Jerusalem in Ethiopia. Construction is said to have happened with the help of angels who worked at night."}},{id:2,name:"Simien Mountains",description:"A UNESCO World Heritage Site with some of the most dramatic landscapes in Africa — jagged escarpments, plunging valleys, and endemic wildlife including the Gelada baboon and Ethiopian wolf.",image:le.simien,location:"Amhara Region",region:"Amhara",details:{overview:"The Simien Mountains were formed by volcanic activity over 40 million years ago, and subsequent erosion has created one of the most spectacular landscapes on Earth. The main peak, Ras Dashen, at 4,550m is the highest point in Ethiopia and the 10th highest in Africa. The park is home to three endemic mammals found nowhere else: the Gelada baboon (the world's last surviving grass-eating primate), the Walia ibex (only 500 remaining), and the Ethiopian wolf.",bestTime:"October – April. Avoid July–September (heavy rain). December–February is clearest.",altitude:"1,900m – 4,550m (Ras Dashen summit)",travelTime:"3 hours by road from Gondar / 1 hr flight to Gondar then 3 hrs drive",mustSee:["Ras Dashen summit (4,550m) – highest point in Ethiopia","Imet Gogo viewpoint – sheer 1,500m drop","Gelada baboon troops (hundreds in a group)","Walia ibex on the cliff ledges","Sankaber escarpment sunset"],funFact:"The Gelada baboon is the only primate in the world that eats primarily grass — up to 90% of its diet. A single troop can contain up to 600 individuals, making it one of the largest primate gatherings on Earth."}},{id:3,name:"Danakil Depression",description:"One of the most extreme environments on Earth — active volcanoes, the world's most colorful sulfur springs, vast salt deserts, and temperatures reaching 50°C make this a truly alien landscape.",image:le.danakil,location:"Afar Region",region:"Afar",details:{overview:"The Danakil Depression sits at -116 meters below sea level — one of the lowest points on Earth — and is considered the hottest inhabited place on the planet, with average temperatures of 34°C year-round. The landscape looks like another planet: Erta Ale is one of only 5 volcanoes on Earth with a permanent lava lake, the Dallol hydrothermal field creates an explosion of yellows, greens, reds and oranges from sulfur and iron compounds, and vast white salt flats stretch for miles where the Afar people mine salt using ancient methods unchanged for centuries.",bestTime:"November – February (coolest months). Avoid May–September when temperatures exceed 50°C.",altitude:"-116 meters (below sea level)",travelTime:"Fly to Mekele (2 hrs from Addis), then 4-5 hrs drive into the depression",mustSee:["Erta Ale active lava lake – midnight ascent","Dallol sulfur springs – the most colorful place on Earth","Salt flat camel caravans loading salt blocks","Lake Afdera – highly salty flamingo lake","Afar salt miners working the ancient trade"],funFact:"Dallol (Danakil) holds the world record for the highest average annual temperature of any inhabited location on Earth — 34°C average. The sulfuric hot springs at Dallol bubble at 106°C (223°F)."}},{id:4,name:"Omo Valley",description:"A living anthropological treasure — home to over 16 indigenous tribes including the Mursi, Hamer, Karo, and Dassanech, each preserving ancient customs, body art, and ceremonies unchanged for centuries.",image:le.omoValley,location:"Southern Nations",region:"Southern Nations",details:{overview:"The Lower Omo Valley in southern Ethiopia is one of the world's last frontiers of traditional tribal culture. Over 200,000 people from 16+ distinct tribes live along the Omo River, each with unique languages, customs, and traditions. The Mursi are famous for their lip plates; the Karo for elaborate body painting with chalk and ochre; the Hamer for the spectacular Bull Jumping ceremony (a rite of passage to manhood); and the Dassanech live on the river's banks, hunting crocodiles and fishing.",bestTime:"October – February (dry). Hamer Bull Jumping ceremonies most common September–November.",travelTime:"Fly to Jinka (2 hrs from Addis) or drive 2 days via Arba Minch",mustSee:["Mursi tribe – lip plate women in Mago National Park","Hamer Bull Jumping ceremony (Ukuli Bulla)","Karo body painting on the Omo River banks","Turmi Monday market – largest tribal market","Dassanech village – cross by dugout canoe"],funFact:"The Omo Valley contains the oldest human fossil evidence ever found — fossils of Homo sapiens dating back 195,000 years were discovered here, making it literally the birthplace of modern humanity."}},{id:5,name:"Gondar",description:"The 'Camelot of Africa' — a royal city of castles, churches, and palaces built in the 17th century by Emperor Fasilides. A UNESCO World Heritage Site that was once the capital of the Ethiopian Empire.",image:le.gondar,location:"Amhara Region",region:"Amhara",details:{overview:"Gondar served as Ethiopia's capital for over 200 years (1636–1855) and was once one of Africa's largest cities. Emperor Fasilides built the first castle in 1636, and subsequent emperors added more palaces, creating the remarkable Royal Enclosure (Fasil Ghebbi) — a walled compound of six castles and numerous smaller structures. The Debre Berhan Selassie Church is considered one of the most beautiful in Ethiopia, with its ceiling covered in over 80 painted angel faces. Every year during Timkat, Fasilides' Bath is filled with water for a spectacular baptism ceremony.",bestTime:"October – March. Visit during Timkat (January 19-20) for the extraordinary baptism ceremony at Fasilides' Bath.",altitude:"2,133 meters above sea level",travelTime:"1.5 hours by flight from Addis Ababa / 2 hrs from Bahir Dar by road",mustSee:["Fasil Ghebbi Royal Enclosure (UNESCO)","Fasilides' Castle – the original 1636 palace","Debre Berhan Selassie Church – 80 angel-face ceiling","Fasilides' Bath – Timkat ceremony site","Kusquam Maryam Church with panoramic views"],funFact:"The ceiling of Debre Berhan Selassie Church is covered with 80 painted Cherubim (angel faces) — all facing outward to watch over the congregation. When Sudanese Dervishes invaded in 1888 and burned most of Gondar, a swarm of bees is said to have driven them away before they reached this church."}},{id:6,name:"Axum",description:"The ancient capital of the Aksumite Empire — one of the great civilizations of the ancient world. Home to towering granite obelisks, the Church of St. Mary of Zion, and the legendary Ark of the Covenant.",image:le.axum,location:"Tigray Region",region:"Tigray",details:{overview:"Axum (Aksum) was the capital of the Aksumite Empire from around 400 BC to 940 AD — one of the most powerful empires of the ancient world, trading with Rome, Greece, Persia, India, and China. At its peak, it controlled territory from Sudan to Arabia. The city is famous for its massive granite stelae (obelisks), some weighing over 500 tons, erected as tomb markers. The Aksumites were among the first peoples in the world to adopt Christianity (4th century AD). The Church of St. Mary of Zion is believed to house the original Ark of the Covenant — one of religion's greatest mysteries.",bestTime:"October – May. Avoid rainy season (June-September). Attend the Maryam Zion festival in November.",altitude:"2,131 meters above sea level",travelTime:"1.5 hours by flight from Addis Ababa",mustSee:["Northern Stelae Field – towering 33m granite obelisks","Church of St. Mary of Zion – believed Ark of the Covenant location","Queen of Sheba's Palace ruins","Ezana Stone – inscriptions in 3 languages (like the Rosetta Stone)","King Kaleb's 6th-century tomb"],funFact:"The Great Stele of Axum, when standing, would have been 33 meters tall and weighed 520 tons — making it the largest single stone monument ever erected in human history. It collapsed in antiquity. The second-largest stele (24.6m) was taken by Italy in 1937 and only returned in 2008."}},{id:7,name:"Bale Mountains",description:"Ethiopia's greatest wildlife sanctuary — home to the world's largest population of Ethiopian wolves, vast Afro-alpine moorlands, the magnificent Harenna Forest, and Africa's second-highest plateau.",image:le.bale,location:"Oromia Region",region:"Oromia",details:{overview:"The Bale Mountains National Park protects 2,150 km² of the most biodiverse mountain ecosystem in Africa. The Sanetti Plateau at 3,960–4,377m is the largest area of Afro-alpine habitat in Africa and forms the stronghold of the Ethiopian wolf — the rarest canid in the world, with only about 500 remaining. Below the plateau, the Harenna Forest is Ethiopia's largest montane forest and one of the last places wild Arabica coffee grows naturally. The park protects 9 endemic mammals and over 280 bird species.",bestTime:"October – December and March – June (dry seasons). Ethiopian wolves most active early morning on the plateau.",altitude:"1,500m – 4,377m (Tullu Dimtu)",travelTime:"5-6 hours by road from Addis Ababa",mustSee:["Ethiopian wolf hunting on Sanetti Plateau – world's rarest canid","Tullu Dimtu (4,377m) – second highest peak in Ethiopia","Mountain Nyala in Dinsho Wildlife Reserve","Wild coffee in the ancient Harenna Forest","Giant lobelia plants on the high moorland"],funFact:"The Ethiopian wolf is the world's rarest canid and Africa's most endangered carnivore — with only about 500 individuals remaining, all in Ethiopian highlands. They are so specialized that they hunt almost exclusively the Giant Mole-rat found only on these same highlands."}},{id:8,name:"Harar",description:"The fourth holiest city in Islam — a perfectly preserved medieval walled city with 368 alleyways, 82 mosques, a vibrant culture, and the world-famous nightly hyena feeding ceremony outside the ancient walls.",image:le.harar,location:"Harari Region",region:"Harari",details:{overview:"Harar Jugol — the walled old city — was inscribed as a UNESCO World Heritage Site in 2006. Founded in the 7th century, Harar has been an important Islamic city for over 1,000 years with its own unique culture, language, and architectural style. The city has more mosques per square kilometer than any other city in the world except Mecca. Every night, the 'Hyena Men' of Harar feed wild spotted hyenas by hand outside the city walls — a tradition begun 500 years ago to appease the hyenas and prevent them from entering the city. French poet Arthur Rimbaud lived in Harar for 10 years, and his house is now a museum.",bestTime:"October – April. The hyena feeding ceremony happens every night at around 7 PM.",altitude:"1,885 meters above sea level",travelTime:"1 hour by flight from Addis Ababa to Dire Dawa, then 1.5 hrs by road to Harar",mustSee:["Hyena feeding ceremony – every evening outside Erer Gate","368 historic alleyways inside Jugol (old city)","Rimbaud House Museum – French poet's former residence","Shoa Gate Market – colorful spices, khat, and crafts","82 mosques – highest density outside Mecca"],funFact:"The people of Harar have been feeding wild spotted hyenas by hand for over 500 years. The hyenas have become so comfortable with humans that they freely roam inside the old city walls at night. Harar residents believe that if the hyenas are well-fed, they will protect the city from evil spirits."}},{id:9,name:"Blue Nile Falls",description:"Known as 'Tis Abay' (Great Smoke) in Amharic — one of Africa's most spectacular waterfalls, where the Blue Nile thunders 45 meters over a 400-meter-wide basalt cliff, creating a permanent rainbow of mist.",image:le.blueNile,location:"Amhara Region",region:"Amhara",details:{overview:"The Blue Nile Falls sit 30km downstream from Lake Tana — the source of the Blue Nile — near the town of Bahir Dar. During the peak rainy season (August-September), the falls reach their maximum width of 400 meters, and the spray can be seen from 5km away — hence the name 'Great Smoke'. The falls drop 45 meters into a gorge that the Blue Nile has carved over millennia. A 17th-century Portuguese bridge crosses the river just above the falls, built during the reign of Emperor Fasilides. Today, hydroelectric diversions reduce the flow in dry season, but the falls are still magnificent.",bestTime:"August – October for maximum flow. Year-round for the rainbow effect. Avoid July–August for crowds.",altitude:"1,900 meters above sea level",travelTime:"1 hour by flight to Bahir Dar, then 30 min drive + 30 min walk",mustSee:["The falls at full flood – 400m wide curtain of water","Rainbow mist that appears daily (morning visits best)","17th-century Portuguese bridge above the falls","Boat ride on Lake Tana to the falls approach","View from the opposite cliff for best photography"],funFact:`The Blue Nile provides approximately 85% of the total water flow of the Nile River — the world's longest river — which eventually flows 6,650km to the Mediterranean Sea in Egypt. The ancient Egyptians called it "Hapi," the god that brought life to Egypt, never knowing it originated in the Ethiopian highlands.`}},{id:10,name:"Addis Ababa",description:"Africa's diplomatic capital and Ethiopia's vibrant heart — home to the African Union headquarters, the National Museum (where Lucy lives), Africa's largest open-air market, and a unique blend of ancient tradition and modern energy.",image:le.addisAbaba,location:"Addis Ababa",region:"Addis Ababa",details:{overview:"Addis Ababa ('New Flower' in Amharic) was founded in 1886 by Emperor Menelik II and Empress Taytu Betul. At 2,355m, it is the third highest capital city in the world. The city is the diplomatic capital of Africa — home to the African Union, UNECA, and over 100 embassies. The National Museum houses 'Lucy' (Dinknesh) — a 3.2-million-year-old Australopithecus afarensis skeleton, one of the oldest known human ancestors. Merkato is Africa's largest open-air market with over 13,000 stalls spread across several city blocks.",bestTime:"Year-round. October – May for the best weather. Avoid heavy rains in July-August.",altitude:"2,355 meters above sea level",travelTime:"Direct international flights to Addis Ababa Bole International Airport",mustSee:["National Museum – see Lucy, 3.2 million year old fossil","Merkato – Africa's largest open-air market","Holy Trinity Cathedral – imperial graves and stunning art","African Union Headquarters – stunning modern architecture","Entoto Natural Park – forest and panoramic views at 3,200m"],funFact:'"Lucy" (known in Ethiopia as "Dinknesh" meaning "you are wonderful") was discovered in 1974 in the Afar region and is 3.2 million years old — making Ethiopia one of the most important places in human evolutionary history. She was named after the Beatles song "Lucy in the Sky with Diamonds" which was playing at the discovery camp.'}},{id:11,name:"Addis Ababa Unity Park",description:"A magnificent 40-hectare living museum inside the Grand Palace compound — showcasing Ethiopia's royal heritage, regional culture pavilions, wildlife enclosures, and beautifully manicured imperial gardens in the heart of the capital.",image:le.unityPark,location:"Addis Ababa",region:"Addis Ababa",details:{overview:"Unity Park was opened in 2019 following a major renovation of the Grand Palace compound by Prime Minister Abiy Ahmed. The 40-hectare park brings together the best of Ethiopian history, culture, and nature in one location. Nine regional cultural pavilions showcase the diversity of Ethiopia's 80+ ethnic groups through traditional architecture, clothing, and artifacts. The wildlife enclosures house lions, leopards, hyenas, colobus monkeys, and exotic birds — rescued animals from across Ethiopia. The imperial palace buildings have been restored to showcase 130 years of Ethiopian royal history.",bestTime:"Year-round. Open Tuesday–Sunday, 8 AM – 6 PM.",altitude:"2,355 meters above sea level",travelTime:"Located in the center of Addis Ababa – 20 min from most hotels",mustSee:["9 regional cultural pavilions – 80+ ethnic groups represented","Wildlife enclosures – lions, leopards, hyenas up close","Imperial palace buildings – 130 years of royal history","Italian-built fountain garden – designed in 1930s","Traditional coffee ceremony inside the cultural pavilions"],funFact:"The Grand Palace compound has been the official residence of Ethiopian leaders for over 100 years — from Emperor Menelik II (who built it in 1887) through Emperor Haile Selassie, the Derg military regime, and to the present day. Unity Park opened to the public for the first time in its 130-year history in 2019."}},{id:12,name:"National Palace",description:"The iconic Jubilee Palace — Ethiopia's official National Palace, built in 1955 for Emperor Haile Selassie's Silver Jubilee. A symbol of imperial grandeur surrounded by lush gardens and steeped in 70 years of Ethiopian political history.",image:le.nationalPalace,location:"Addis Ababa",region:"Addis Ababa",details:{overview:"The Jubilee Palace (National Palace) was built in 1955 to mark the 25th jubilee of Emperor Haile Selassie's coronation. Designed by Italian architects, it served as the emperor's main residence until his overthrow in 1974 and has been the official state residence ever since. The palace features European-style ceremonial halls, a grand staircase, state reception rooms decorated with Ethiopian art, and beautifully maintained gardens. It remains the official residence of the Ethiopian President and is used for official state functions and the reception of foreign dignitaries.",bestTime:"Year-round. Visits are by guided tour arrangement through official channels.",altitude:"2,355 meters above sea level",travelTime:"Located in central Addis Ababa – 15 min from most hotels",mustSee:["Grand ceremonial entrance hall","State reception rooms with Ethiopian artwork","Imperial gardens with rare tree collection","Portrait gallery of Ethiopian heads of state","External architecture and landscaped grounds"],funFact:`Emperor Haile Selassie kept a collection of pet lions at the Jubilee Palace grounds — a tradition of Ethiopian emperors dating back centuries. The lions were symbols of the "Lion of Judah," one of the emperor's royal titles. After his overthrow in 1974, the lions were moved to the Addis Ababa Zoo.`}},{id:13,name:"Entoto Park",description:"Perched at 3,200 meters above Addis Ababa, Entoto Natural Park offers sweeping panoramic city views, dense eucalyptus forests, the historic Maryam Church where Emperor Menelik II was crowned, and refreshing highland walking trails.",image:le.entotoPark,location:"Addis Ababa",region:"Addis Ababa",details:{overview:"Entoto is the ridge of mountains that rises directly north of Addis Ababa to 3,200 meters — making it one of the highest points easily accessible from any major African city. Emperor Menelik II chose Entoto as his capital before moving down to what is now Addis Ababa in 1887. The Entoto Maryam Church was built in 1882 and is where Menelik II was crowned King of Kings. The area is covered in eucalyptus forests — trees introduced from Australia in the 1890s by Emperor Menelik II to provide firewood and construction material for the rapidly growing capital. The park has been restored with walking trails, picnic areas, and a museum.",bestTime:"October – May. Early morning (7-10 AM) for the best views before clouds form. Cooler than the city.",altitude:"3,200 meters above sea level",travelTime:"30-45 minutes drive from Addis Ababa city center",mustSee:["Panoramic view over all of Addis Ababa (on clear days)","Entoto Maryam Church – Menelik's coronation site (1889)","Menelik's Palace museum on the hilltop","Women carrying eucalyptus on their backs – iconic Entoto image","Walking trails through eucalyptus forest – 4-6 km options"],funFact:"The eucalyptus trees now covering Entoto and much of Ethiopia were imported from Australia in the 1890s by Emperor Menelik II. He was facing a major firewood crisis as the original forests were cut down. The fast-growing eucalyptus solved the problem but fundamentally changed Ethiopia's highland landscape forever."}},{id:14,name:"Wenchi Crater Lake",description:"A breathtaking volcanic crater lake hidden near Ambo town — an emerald-green lake inside a 7km-wide caldera, surrounded by dense cloud forest, steaming hot springs, a waterfall, and an ancient monastery on a lake island.",image:le.wenchi,location:"Oromia Region",region:"Oromia",details:{overview:"Wenchi Crater Lake is one of Ethiopia's most spectacular and least-visited natural wonders. The volcanic caldera, 7km wide, was formed by an ancient eruption and has since filled with emerald-green water surrounded by lush cloud forest. Visitors descend into the crater on horseback along traditional trails, then take wooden dugout boats across the lake to visit the island monastery of Cherkos Church — where monks preserve ancient manuscripts and ceremonial crosses. Natural hot springs bubble at the lake's edge, and a hidden 30-meter waterfall tumbles inside the crater.",bestTime:"October – May (dry season). April – June sees the crater forests in full bloom. Avoid July–September rainy season.",altitude:"2,900 meters (crater rim) / 2,400m (lake level)",travelTime:"2.5 hours by road from Addis Ababa, passing through Ambo (mineral water springs)",mustSee:["Horseback descent into the 7km-wide volcanic crater","Wooden boat trip across the emerald crater lake","Cherkos Island Monastery – ancient manuscripts and crosses","Natural hot springs and geothermal pools","Hidden 30-meter waterfall inside the crater"],funFact:"Wenchi Crater Lake sits at 2,400 meters above sea level inside the crater, while the rim towers 500 meters above it at 2,900m. The lake is fed by underground springs and geothermal activity — explaining why hot springs bubble up alongside the cold crater lake waters. Fish thrive in the cold lake despite the geothermal activity."}},{id:15,name:"Gorgora",description:"A tranquil lakeside retreat on the southern shores of Lake Tana — Ethiopia's largest lake. Explore 17th-century Portuguese castle ruins, visit ancient island monasteries by boat, watch hippos at dusk, and unwind at eco-lodge accommodations.",image:le.gorgora,location:"Amhara Region",region:"Amhara",details:{overview:"Gorgora sits on the southern shore of Lake Tana, Ethiopia's largest lake (3,600 km²) and the source of the Blue Nile. The town was an important trading and religious center during the 17th century, when Portuguese missionaries and merchants established a presence in Ethiopia. The ruins of a 17th-century Portuguese castle and church still stand near the lake. Lake Tana has 37 islands, many containing ancient monasteries dating back to the 13th century. The lake is home to large hippopotamus populations, abundant birdlife, and the ancient tradition of papyrus tankwa boats.",bestTime:"October – May. Evening hippo watching is best year-round. Avoid July-August peak rains.",altitude:"1,800 meters above sea level",travelTime:"Fly to Gondar (1.5 hrs from Addis) then drive 2 hours to Gorgora; or fly to Bahir Dar and drive 3 hours",mustSee:["Portuguese castle ruins from the 1630s","Boat trip to Lake Tana island monasteries","Hippo watching at sunset from the eco-lodge dock","Debre Sina Maryam Church – beautifully painted interior","African fish eagle and pelican birdwatching on the lake"],funFact:"Lake Tana contains 37 islands, of which 20 have monasteries. Some of these monasteries are women-only or men-only — with strict rules that even female animals are not permitted on certain islands. The monasteries have been hiding Ethiopia's royal treasures, mummies of Ethiopian emperors, and ancient manuscripts for centuries."}},{id:16,name:"Chebera Churchura National Park",description:"One of Ethiopia's best-kept wildlife secrets in the southern highlands — vast wilderness with Africa's largest hippo pools, elephant herds, buffalo, lions, leopards, and over 300 bird species. Rarely visited, utterly wild.",image:le.cheberaChurchura,location:"Southern Nations",region:"Southern Nations",details:{overview:"Chebera Churchura National Park was established in 2005 and covers 1,215 km² in the Dawro Zone of southern Ethiopia. The park descends from highlands at 2,528m down to river valleys at 890m, creating multiple vegetation zones from montane forest to savannah woodland. The Koysha River and its tributaries flow through the park, hosting what many wildlife experts consider one of Ethiopia's largest hippo populations — some pools contain 50-80 hippos. The park also has significant elephant populations, large buffalo herds, and is one of the most promising areas in Ethiopia for big cat conservation.",bestTime:"November – April (dry season). Game drives most productive November-January when vegetation is lower.",altitude:"890m – 2,528m",travelTime:"8-9 hours by road from Addis Ababa via Hosanna and Dawro",mustSee:["Koysha River hippo pools – 50-80 hippos in one pool","African elephant herds in riverine forest","Lion and leopard tracking with park rangers","Night game drive – civet, genet, African wildcat","300+ bird species including hornbills, kingfishers, and eagles"],funFact:"Chebera Churchura is so remote and rarely visited that some wildlife researchers believe it may harbor one of the last viable populations of African wild dogs in Ethiopia — a species that has disappeared from 25 out of 39 African countries in the past 100 years. Most years, fewer than 500 tourists visit this extraordinary park."}},{id:17,name:"Maze National Park",description:"Ethiopia's most underrated wildlife reserve in the Omo Zone — vast savannah grasslands hosting the endemic and endangered Swayne's hartebeest, lion prides, leopards, African wild dogs, and an extraordinary diversity of birds.",image:le.mazeNationalPark,location:"Southern Nations",region:"Southern Nations",details:{overview:"Maze National Park, established in 1989, protects 2,384 km² of diverse savannah and woodland in the Omo Zone of southern Ethiopia. It is the primary stronghold of Swayne's hartebeest — an endemic subspecies of hartebeest found only in Ethiopia and declared endangered by the IUCN. The park's landscape includes riverine forest along the Maze River, open grasslands perfect for herbivores and predators, and acacia woodland providing habitat for leopards. The park connects to the greater Omo-Tama-Mago ecosystem, allowing wildlife to move between protected areas.",bestTime:"November – March (dry season). January is peak time for large herbivore concentrations.",altitude:"900m – 1,800m",travelTime:"7-8 hours by road from Addis Ababa via Sodo (Wolayta)",mustSee:["Swayne's hartebeest – endemic to Ethiopia, found only here","Lion prides hunting in open savannah at dawn","Secretary bird and ground hornbill stalking the grasslands","Leopard in acacia trees along the Maze River","African wild dog packs (rare – extraordinary if seen)"],funFact:"Swayne's hartebeest was once abundant across the Horn of Africa. By 1900, colonial hunting and habitat loss had reduced the population to fewer than 100 animals — nearly extinct. Conservation efforts have brought them back to around 3,000 individuals, almost all of which live in Maze National Park. Seeing them is like witnessing a species pulled back from the brink."}}],Y0=[{id:1,src:ne.g01,alt:"Lalibela Rock Churches",category:"Historic"},{id:2,src:ne.g02,alt:"Simien Mountains Panorama",category:"Nature"},{id:3,src:ne.g03,alt:"Danakil Depression",category:"Adventure"},{id:4,src:ne.g04,alt:"Omo Valley Tribes",category:"Culture"},{id:5,src:ne.g05,alt:"Gondar Castles",category:"Historic"},{id:6,src:ne.g06,alt:"Bale Mountains",category:"Nature"},{id:7,src:ne.g07,alt:"Harar Old City",category:"Culture"},{id:8,src:ne.g08,alt:"Ancient Axum",category:"Historic"},{id:9,src:ne.g09,alt:"Blue Nile Falls",category:"Nature"},{id:10,src:ne.g10,alt:"Mountain Trekking",category:"Adventure"},{id:11,src:ne.g11,alt:"Ethiopian Landscape",category:"Nature"},{id:12,src:ne.g12,alt:"Highland Peaks",category:"Adventure"},{id:13,src:ne.g13,alt:"Ethiopian Sunrise",category:"Nature"},{id:14,src:ne.g14,alt:"Valley Panorama",category:"Nature"},{id:15,src:ne.g15,alt:"Misty Forest",category:"Nature"},{id:16,src:ne.g16,alt:"Cultural Dance",category:"Culture"},{id:17,src:ne.g17,alt:"Desert Landscape",category:"Adventure"},{id:18,src:ne.g18,alt:"Lake Scenery",category:"Nature"},{id:19,src:ne.g19,alt:"Waterfall Bridge",category:"Nature"},{id:20,src:ne.g20,alt:"Gre
